<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ж·»еҠ з”ЁжҲ·дҝЎжҒҜ</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="/content/lib/layui-v2.9.18/css/layui.css" media="all">
    <link rel="stylesheet" href="/content/lib/font-awesome-4.7.0/css/font-awesome.min.css" media="all">
    <link rel="stylesheet" href="/content/css/public.css" media="all">
    <style>
        .layui-btn:not(.layui-btn-lg ):not(.layui-btn-sm):not(.layui-btn-xs) {
            height: 34px;
            line-height: 34px;
            padding: 0 8px;
        }
        .layui-iconpicker-body.layui-iconpicker-body-page .hide {
            display: none;
        }
    </style>
</head>
<body style="background-color: #FFF;">
    <div class="layuimini-main">
        <div class="layui-col-md12 top10">
            <form class="layui-form" action="">
                <div class="layui-form-item">
                    <input name="id" lay-verify="required" style="display: none;" lay-vertype="tips" class="layui-input" type="text" value="${model name:`AgentChatUserInfo`, property:`Id`}" />
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">еҗҚз§°пјҡ</label>
                    <div class="layui-input-inline">
                        <input type="text" name="name" lay-verify="required|account" lay-min="1" autocomplete="off" class="layui-input account" placeholder="иҜ·иҫ“е…ҘеҗҚз§°" value="${model name:`AgentChatUserInfo`, property:`Name`}" />
                    </div>
                    <label class="layui-form-label">и§’иүІIDпјҡ</label>
                    <div class="layui-input-inline">
                        <input type="number" name="roleId" lay-verify="required|account" lay-min="1" autocomplete="off" class="layui-input account" placeholder="иҜ·иҫ“е…Ҙи§’иүІID" value="${model name:`AgentChatUserInfo`, property:`RoleId`}" />
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">е№ҙйҫ„пјҡ</label>
                    <div class="layui-input-inline">
                        <input type="number" name="age" lay-verify="required|account" lay-min="1" autocomplete="off" class="layui-input account" placeholder="иҜ·иҫ“е…Ҙе№ҙйҫ„" value="${model name:`AgentChatUserInfo`, property:`Age`}" />
                    </div>
                    <label class="layui-form-label">жҖ§еҲ«пјҡ</label>
                    <div class="layui-input-inline">
                        <select name='sex'>
                            <option ${if name:`AgentChatUserInfo`, property:`Enable`, value:`1`, ifval:`selected`} value='1'> з”· </option>
                            <option ${if name:`AgentChatUserInfo`, property:`Enable`, value:`2`, ifval:`selected`} value='2'> еҘі </option>
                        </select>
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">иә«й«ҳпјҡ</label>
                    <div class="layui-input-inline">
                        <input type="number" name="height" lay-verify="required|account" lay-min="1" autocomplete="off" class="layui-input account" placeholder="иҜ·иҫ“е…Ҙиә«й«ҳ" value="${model name:`AgentChatUserInfo`, property:`Height`}" />
                    </div>
                    <label class="layui-form-label">дҪ“йҮҚпјҡ</label>
                    <div class="layui-input-inline">
                        <input type="number" name="weight" lay-verify="required|account" lay-min="1" autocomplete="off" class="layui-input account" placeholder="иҜ·иҫ“е…ҘдҪ“йҮҚ" value="${model name:`AgentChatUserInfo`, property:`Weith`}" />
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">зҠ¶жҖҒпјҡ</label>
                    <div class="layui-input-inline">
                        <input name="enable" value="true" title="еҗҜз”Ё" ${if name:`AgentChatUserInfo`, property:`Enable`, value:`true`, ifval:`checked`} type="radio" />
                        <div class="layui-unselect layui-form-radio layui-form-radioed">
                            <i class="layui-anim layui-icon">оҷғ</i><div>еҗҜз”Ё</div>
                        </div>
                        <input name="enable" value="false" title="еҒңз”Ё" ${if name:`AgentChatUserInfo`, property:`Enable`, value:`false`, ifval:`checked`} type="radio" />
                        <div class="layui-unselect layui-form-radio">
                            <i class="layui-anim layui-icon">оҳҝ</i><div>еҒңз”Ё</div>
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">еӨҮжіЁпјҡ</label>
                    <div class="layui-input-block">
                        <textarea class="layui-textarea" cols="20" id="remarks" lay-verify="pass" lay-vertype="tips" name="remarks" rows="2" placeholder="иҜ·иҫ“е…ҘеӨҮжіЁ">${model name:`AgentChatUserInfo`, property:`Remarks`}</textarea>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-input-block">
                        <button class="layui-btn" lay-submit="" lay-filter="submitForm">з«ӢеҚіжҸҗдәӨ</button>
                        <button type="reset" class="layui-btn layui-btn-primary">йҮҚзҪ®</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <script src="/content/lib/layui-v2.9.18/layui.js" charset="utf-8"></script>
    <script src="/content/js/lay-config.js?v=1.0.4" charset="utf-8"></script>
    <script>
        //е…ій—ӯйЎөйқў
        function CloseWin() {
            parent.location.reload(); // зҲ¶йЎөйқўеҲ·ж–°
            var index = parent.layer.getFrameIndex(window.name); //е…Ҳеҫ—еҲ°еҪ“еүҚiframeеұӮзҡ„зҙўеј•
            parent.layer.close(index); //еҶҚжү§иЎҢе…ій—ӯ
        }
        layui.use(['jquery', 'form', 'layer'], function () {
            var $ = layui.jquery,
                form = layui.form,
                layer = layui.layer;
            //зӣ‘еҗ¬жҸҗдәӨ
            form.on('submit(submitForm)', function (data) {

                data.field.enable = (data.field.enable === "true");
                $.ajax({
                    type: 'POST',
                    url: '/user/edit',
                    data: JSON.stringify(data.field),
                    async: false,
                    dataType: 'json',
                    contentType: 'application/json',
                    success: function (result) {
                        if (result.code == 0) {
                            layer.msg(result.message, {
                                icon: 1  //1:еӢҫ 6пјҡз¬‘и„ё
                            });
                            setTimeout(CloseWin, 1000);
                        }
                        else {
                            layer.msg(result.message, {
                                icon: 5  //1:еӢҫ 6пјҡз¬‘и„ё
                            });
                        }
                    },
                    error: function (msg) {
                        layer.msg(result.message, {
                            icon: 5  //1:еӢҫ 6пјҡз¬‘и„ё
                        });
                    }
                });
                return false;
            });
            //йӘҢиҜҒиҫ“е…ҘеӨ§е°Ҹ
            form.verify({
                account: function (value, item) {
                    var min = item.getAttribute('lay-min');
                    if (value.length < min) {
                        return 'иҫ“е…ҘеҶ…е®№дёҚиғҪе°ҸдәҺ' + min + '';
                    }
                }
            });
        });
    </script>
</body>
</html>
